<style>
:root{
  --bg:#f6f7f9; --panel:#fff; --ink:#1a1d21; --muted:#5b6570; --line:#e3e7ec;

  --cash:#047857; --credit:#1d4ed8; --chip:#eef2f7;
}
@media (prefers-color-scheme:dark){:root{--bg:#0e1116;--panel:#161b22;--ink:#e6edf3;--muted:#9aa7b4;--line:#2a313a;--chip:#20262e;}}
:root[data-theme="dark"]{--bg:#0e1116;--panel:#161b22;--ink:#e6edf3;--muted:#9aa7b4;--line:#2a313a;--chip:#20262e;}
:root[data-theme="light"]{--bg:#f6f7f9;--panel:#fff;--ink:#1a1d21;--muted:#5b6570;--line:#e3e7ec;--chip:#eef2f7;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
header{padding:18px 22px;border-bottom:1px solid var(--line);background:var(--panel)}
h1{margin:0;font-size:18px;font-weight:650}
.sub{color:var(--muted);font-size:12.5px;margin-top:3px}
.wrap{padding:16px 22px;max-width:1400px;margin:0 auto}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
.kpi .n{font-size:22px;font-weight:680;letter-spacing:-.5px}
.kpi .l{color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.controls{display:flex;flex-wrap:wrap;gap:10px 14px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:14px}
.controls label{font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:4px}
select,input[type=text]{background:var(--bg);color:var(--ink);border:1px solid var(--line);border-radius:7px;padding:6px 8px;font-size:13px;min-width:120px}
.tierbtns{display:flex;gap:6px}
.tchip{cursor:pointer;user-select:none;border:1px solid var(--line);border-radius:20px;padding:4px 10px;font-size:12px;background:var(--bg);color:var(--muted)}
.tchip.on{color:#fff;border-color:transparent}
.tchip[data-t="1"].on{background:var(--t1)} .tchip[data-t="2"].on{background:var(--t2)}
.tchip[data-t="3"].on{background:var(--t3)} .tchip[data-t="4"].on{background:var(--t4)}
table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.tablewrap{overflow-x:auto}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap;font-size:13px}
th{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);position:sticky;top:0;background:var(--panel);cursor:pointer}
tr.grp{cursor:pointer;font-weight:600}
tr.grp:hover,tr.pair:hover{background:var(--chip)}
td.num{text-align:right;font-variant-numeric:tabular-nums}
.badge{display:inline-block;min-width:20px;text-align:center;color:#fff;border-radius:5px;padding:1px 6px;font-size:11px;font-weight:600}
.b1{background:var(--t1)} .b2{background:var(--t2)} .b3{background:var(--t3)} .b4{background:var(--t4)}
.tender{font-weight:600}.tender.Cash{color:var(--cash)}.tender.Credit{color:var(--credit)}
a.nrs{color:var(--accent);text-decoration:none;font-variant-numeric:tabular-nums}
a.nrs:hover{text-decoration:underline}
.arrow{color:var(--muted);padding:0 4px}
.det{background:var(--bg)}
.det td{padding:0}
.items{margin:0;padding:8px 14px 12px 40px}
.items table{border:none;background:transparent}
.items th,.items td{border-bottom:1px dashed var(--line);white-space:nowrap}
.caret{display:inline-block;width:12px;color:var(--muted);transition:transform .12s}
.open .caret{transform:rotate(90deg)}
.muted{color:var(--muted)}
.foot{color:var(--muted);font-size:11.5px;margin:14px 2px}
.trend{display:flex;align-items:flex-end;gap:3px;height:60px;margin-top:8px}
.trend .bar{flex:1;background:var(--accent);border-radius:2px 2px 0 0;min-height:2px;opacity:.85}
.trendlab{display:flex;gap:3px;margin-top:3px}.trendlab span{flex:1;text-align:center;font-size:9px;color:var(--muted)}
</style>

<script>
const DATA = JSON.parse(document.getElementById('DATA').textContent);
const P = DATA.pairs;
const NRS = DATA.nrsTxnUrl;
const $=id=>document.getElementById(id);
const money=n=>'$'+(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const tname=t=>t.split(' ')[0]; // Cash / Credit
const flip=p=>tname(p.orig.tender)+'→'+tname(p.dup.tender);
const state={groupBy:'none',tiers:new Set([1,2]),vendor:'',month:'',search:''};

// populate filter dropdowns
[...new Set(P.map(p=>p.vendor))].sort().forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;$('vendorF').appendChild(o);});
[...new Set(P.map(p=>p.month))].sort().forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;$('monthF').appendChild(o);});

function filtered(){
  return P.filter(p=>state.tiers.has(p.tier)
    && (!state.vendor||p.vendor===state.vendor)
    && (!state.month||p.month===state.month)
    && (!state.search|| (p.orig.invoice+' '+p.dup.invoice+' '+p.items.map(i=>i.item+' '+i.partNumber+' '+i.vendor).join(' ')).toLowerCase().includes(state.search.toLowerCase())));
}
function agg(rows){return {n:rows.length, overpay:rows.reduce((s,p)=>s+p.overpay,0), excise:rows.reduce((s,p)=>s+p.exciseTax,0), gross:rows.reduce((s,p)=>s+p.amount,0)};}

function kpis(rows){
  const a=agg(rows);
  $('kpis').innerHTML=[
    ['Duplicate pairs',a.n],
    ['Vendor overpayment',money(a.overpay)],
    ['Excise tax to DOR',money(a.excise)],
    ['Gross inflation',money(a.gross)]
  ].map(([l,n])=>`<div class="kpi"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('');
}
function tenderHtml(t){return `<span class="tender ${tname(t)}">${t}</span>`;}
function nrsLink(inv,reg){return reg?`<a class="nrs" target="_blank" rel="noopener" href="${NRS}${reg}">#${inv??reg}</a>`:('#'+(inv??'?'));}
function badge(t){return `<span class="badge b${t}">T${t}</span>`;}

function pairRow(p,idx){
  return `<tr class="pair" data-i="${idx}">
    <td><span class="caret">▸</span> ${badge(p.tier)}</td>
    <td>${p.orig.date}</td>
    <td>${nrsLink(p.orig.invoice,p.orig.cashReg)} ${tenderHtml(p.orig.tender)}<div class="muted" style="font-size:11px">${p.orig.created.slice(11,16)}</div></td>
    <td class="arrow">→</td>
    <td>${nrsLink(p.dup.invoice,p.dup.cashReg)} ${tenderHtml(p.dup.tender)}<div class="muted" style="font-size:11px">${p.dup.date} ${p.dup.created.slice(11,16)}</div></td>
    <td class="num">${p.createGapHrs<1?Math.round(p.createGapHrs*60)+'m':(p.invGapDays+'d')}</td>
    <td>${p.vendor}</td>
    <td class="num">${money(p.amount)}</td>
    <td class="num">${money(p.overpay)}</td>
    <td class="num">${money(p.exciseTax)}</td>
    <td class="muted">${p.dup.cashier||'—'}</td>
  </tr>`;
}
function itemRows(p){
  return `<tr class="det"><td colspan="11"><div class="items"><table><thead><tr><th>Vendor</th><th>Part#</th><th>Item</th><th>Qty</th><th>Price</th><th>Tax</th><th>Vendor portion</th><th>Line total</th></tr></thead><tbody>`
    + p.items.map(it=>`<tr><td>${it.vendor}</td><td>${it.partNumber}</td><td>${it.item}</td><td class="num">${it.qty}</td><td class="num">${money(it.price)}</td><td class="num">${money(it.tax)}</td><td class="num">${money(it.vendorPortion)}</td><td class="num">${money(it.lineTotal)}</td></tr>`).join('')
    + `</tbody></table><div class="muted" style="margin-top:6px">Original ${nrsLink(p.orig.invoice,p.orig.cashReg)} (${p.orig.tender}, keyed ${p.orig.created}) &nbsp;·&nbsp; Duplicate ${nrsLink(p.dup.invoice,p.dup.cashReg)} (${p.dup.tender}, keyed ${p.dup.created})</div></div></td></tr>`;
}

function render(){
  const rows=filtered();
  kpis(rows);
  // trend
  const byM={}; rows.forEach(p=>byM[p.month]=(byM[p.month]||0)+p.overpay);
  const ms=Object.keys(byM).sort(); const mx=Math.max(1,...ms.map(m=>byM[m]));
  if(state.groupBy==='month'||ms.length>1){$('trendbox').style.display='';
    $('trend').innerHTML=ms.map(m=>`<div class="bar" style="height:${Math.round(byM[m]/mx*100)}%" title="${m}: ${money(byM[m])}"></div>`).join('');
    $('trendlab').innerHTML=ms.map(m=>`<span>${m.slice(2)}</span>`).join('');
  } else $('trendbox').style.display='none';

  const th=$('thead'), tb=$('tbody');
  if(state.groupBy==='none'){
    th.innerHTML=`<tr><th>Tier</th><th>Orig date</th><th>Original (wrong)</th><th></th><th>Duplicate (re-ring)</th><th>Gap</th><th>Vendor</th><th>Amount</th><th>Vendor overpay</th><th>Excise</th><th>Cashier</th></tr>`;
    tb.innerHTML=rows.map((p,i)=>pairRow(p,i)).join('')||`<tr><td colspan="11" class="muted" style="padding:18px">No pairs match the filter.</td></tr>`;
  } else {
    const keyf={month:p=>p.month,vendor:p=>p.vendor,flip:flip,cashier:p=>p.dup.cashier||'—',tier:p=>'T'+p.tier}[state.groupBy];
    const groups={}; rows.forEach(p=>{const k=keyf(p);(groups[k]=groups[k]||[]).push(p);});
    const keys=Object.keys(groups).sort((a,b)=>agg(groups[b]).overpay-agg(groups[a]).overpay);
    th.innerHTML=`<tr><th>${state.groupBy[0].toUpperCase()+state.groupBy.slice(1)}</th><th>Pairs</th><th>Vendor overpay</th><th>Excise</th><th>Gross</th></tr>`;
    tb.innerHTML=keys.map((k,gi)=>{const a=agg(groups[k]);
      return `<tr class="grp" data-g="${gi}"><td><span class="caret">▸</span> ${k}</td><td class="num">${a.n}</td><td class="num">${money(a.overpay)}</td><td class="num">${money(a.excise)}</td><td class="num">${money(a.gross)}</td></tr>`
      +`<tr class="det" data-gd="${gi}" style="display:none"><td colspan="5"><div class="tablewrap"><table><tbody>${groups[k].map((p,i)=>pairRow(p,'g'+gi+'_'+i)).join('')}</tbody></table></div></td></tr>`;
    }).join('');
    window._groups=groups; window._keys=keys;
  }
  $('foot').textContent=`${rows.length} pairs shown · ${DATA.pairCount} total · NRS # links open the transaction in NRS. Cashier is NRS's POS login (often a shared "Default Cashier"/"YF"), not an individual.`;
  bind();
}
function bind(){
  document.querySelectorAll('tr.pair').forEach(tr=>tr.onclick=e=>{
    if(e.target.closest('a'))return;
    const i=tr.dataset.i; let p;
    if(String(i).startsWith('g')){const [g,idx]=i.slice(1).split('_');p=window._groups[window._keys[g]][idx];}
    else p=filtered()[i];
    const nx=tr.nextElementSibling;
    if(nx&&nx.classList.contains('detrow')){nx.remove();tr.classList.remove('open');}
    else{tr.classList.add('open');tr.insertAdjacentHTML('afterend',itemRows(p).replace('class="det"','class="det detrow"'));}
  });
  document.querySelectorAll('tr.grp').forEach(tr=>tr.onclick=()=>{
    const d=document.querySelector(`tr[data-gd="${tr.dataset.g}"]`);
    const show=d.style.display==='none';d.style.display=show?'':'none';tr.classList.toggle('open',show);
    if(show)bind();
  });
}
$('groupBy').onchange=e=>{state.groupBy=e.target.value;render();};
$('vendorF').onchange=e=>{state.vendor=e.target.value;render();};
$('monthF').onchange=e=>{state.month=e.target.value;render();};
$('search').oninput=e=>{state.search=e.target.value;render();};
$('tierbtns').onclick=e=>{const c=e.target.closest('.tchip');if(!c)return;const t=+c.dataset.t;c.classList.toggle('on');if(state.tiers.has(t))state.tiers.delete(t);else state.tiers.add(t);render();};
$('sub').textContent=`${DATA.pairCount} identical-item / opposite-tender duplicate pairs · ${DATA.store} · full history. Default view: Tier 1+2 (near-certain + strong).`;
render();
</script>
